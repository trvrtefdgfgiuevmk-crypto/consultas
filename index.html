<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Consulta Pro</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e40af);
      min-height: 100vh;
      color: #fff;
      display: flex;
      flex-direction: column;
    }
    .container { max-width: 900px; width: 100%; margin: 40px auto; padding: 20px; }
    header { text-align: center; margin-bottom: 40px; }
    h1 { font-size: 2.5rem; font-weight: 600; letter-spacing: -1px; }
    .subtitle { opacity: 0.8; font-size: 1.1rem; margin-top: 8px; }
    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    }
    .search-area { display: flex; gap: 12px; margin-bottom: 10px; }
    input {
      flex: 1;
      padding: 16px 20px;
      border: 2px solid transparent;
      border-radius: 14px;
      font-size: 1.1rem;
      background: rgba(255, 255, 255, 0.95);
      color: #0f172a;
      outline: none;
    }
    input:focus { border-color: #fbbf24; background: #fff; }
    button {
      padding: 0 32px;
      background: #fbbf24;
      color: #0f172a;
      border: none;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: #f59e0b; transform: translateY(-2px); }
    .hint { font-size: 0.85rem; margin-top: 10px; opacity: 0.75; }
    .result { display: none; background: #ffffff; color: #1e2937; border-radius: 16px; padding: 25px; margin-top: 25px; animation: slideUp 0.4s ease-out; }
    .result.show { display: block; }
    .result-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px; border-bottom: 1px solid #e2e8f0; padding-bottom: 15px;
    }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 15px;
    }
    .info-item {
      background: #f1f5f9;
      padding: 15px;
      border-radius: 12px;
      border-left: 4px solid #3b82f6;
    }
    .info-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: 700;
      color: #64748b;
      margin-bottom: 6px;
    }
    .info-value {
      font-size: 1rem;
      font-weight: 600;
      color: #1e3a8a;
      word-break: break-all;
    }
    .loading { text-align: center; padding: 30px; display: none; }
    .spinner {
      width: 45px; height: 45px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid #fbbf24;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 15px;
    }
    .error-msg {
      background: #fee2e2;
      color: #dc2626;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
      display: none;
      font-weight: 500;
      text-align: center;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    footer { margin-top: auto; padding: 20px; text-align: center; opacity: 0.6; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>⚡ Painel de Consulta Pro</h1>
      <p class="subtitle">CEP • Telefone • CNPJ • Discord User ID</p>
    </header>
    <div class="card">
      <div class="search-area">
        <input type="text" id="inputDado" placeholder="Digite CEP, Telefone, CNPJ ou Discord User ID..." autocomplete="off">
        <button id="btnConsultar">CONSULTAR</button>
      </div>
      <p class="hint">
        Ex: 01001000 (CEP) | 11999998888 (Tel) | 00000000000191 (CNPJ) | 80351110224678912 (Discord ID)
      </p>

      <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Consultando...</p>
      </div>
      <div id="errorBox" class="error-msg"></div>
      <div id="resultado" class="result">
        <div class="result-header">
          <h2 id="tipoConsulta" style="color: #1e40af; font-size: 1.2rem;">Dados Encontrados</h2>
          <span id="timestamp" style="font-size: 0.8rem; color: #94a3b8;"></span>
        </div>
        <div class="info-grid" id="infoGrid"></div>
      </div>
    </div>
  </div>

  <footer>
    ViaCEP • BrasilAPI • dclookup.id (Discord)
  </footer>

  <script>
    const btn = document.getElementById('btnConsultar');
    const inputField = document.getElementById('inputDado');
    const errorBox = document.getElementById('errorBox');
    const loading = document.getElementById('loading');
    const resultado = document.getElementById('resultado');
    const infoGrid = document.getElementById('infoGrid');

    btn.addEventListener('click', puxarDados);
    inputField.addEventListener('keypress', (e) => { if (e.key === 'Enter') puxarDados(); });

    async function puxarDados() {
      let valor = inputField.value.trim().replace(/\s+/g, '');
      if (!valor) return showError('Digite algo para consultar.');

      errorBox.style.display = 'none';
      resultado.classList.remove('show');
      loading.style.display = 'block';
      infoGrid.innerHTML = '';

      try {
        let tipo = "";

        if (valor.length === 8 && !isNaN(valor)) {
          tipo = "Endereço (CEP)";
          const res = await fetch(`https://viacep.com.br/ws/${valor}/json/`);
          const data = await res.json();
          if (data.erro) throw new Error("CEP não encontrado.");
          renderCEP(data);

        } else if ((valor.length === 10 || valor.length === 11) && !isNaN(valor)) {
          tipo = "Localidade de Telefone";
          const ddd = valor.substring(0, 2);
          const res = await fetch(`https://brasilapi.com.br/api/ddd/v1/${ddd}`);
          if (!res.ok) throw new Error("DDD inválido.");
          const data = await res.json();
          renderTelefone(data, valor);

        } else if (valor.length === 14 && !isNaN(valor)) {
          tipo = "Empresa (CNPJ)";
          const res = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${valor}`);
          if (!res.ok) throw new Error("CNPJ não encontrado.");
          const data = await res.json();
          renderCNPJ(data);

        } else if (valor.length >= 17 && valor.length <= 20 && !isNaN(valor)) {
          // Discord - API atualizada
          tipo = "Discord User";
          const res = await fetch(`https://www.dclookup.id/api/user/${valor}`);
          if (!res.ok) throw new Error("User ID não encontrado ou API indisponível no momento.");
          const data = await res.json();
          renderDiscord(data);

        } else {
          throw new Error("Formato inválido. Verifique os exemplos.");
        }

        document.getElementById('tipoConsulta').innerText = `✅ ${tipo}`;
        document.getElementById('timestamp').innerText = new Date().toLocaleTimeString('pt-BR');
        loading.style.display = 'none';
        resultado.classList.add('show');

      } catch (err) {
        loading.style.display = 'none';
        showError(err.message);
      }
    }

    function renderCEP(data) {
      buildGrid([
        { label: "Logradouro", value: data.logradouro || '—' },
        { label: "Bairro", value: data.bairro || '—' },
        { label: "Cidade", value: data.localidade },
        { label: "Estado", value: data.uf },
        { label: "DDD", value: data.ddd },
        { label: "IBGE", value: data.ibge }
      ]);
    }

    function renderCNPJ(data) {
      buildGrid([
        { label: "Razão Social", value: data.razao_social },
        { label: "Nome Fantasia", value: data.nome_fantasia || 'Não informado' },
        { label: "Situação", value: data.descricao_situacao_cadastral },
        { label: "Abertura", value: data.data_inicio_atividade },
        { label: "Cidade/UF", value: `${data.municipio} - ${data.uf}` },
        { label: "Capital Social", value: `R$ ${Number(data.capital_social || 0).toLocaleString('pt-BR')}` }
      ]);
    }

    function renderTelefone(data, original) {
      buildGrid([
        { label: "Número", value: original },
        { label: "Estado", value: data.state },
        { label: "Tipo", value: original.length === 11 ? "Celular" : "Fixo" },
        { label: "Cidades", value: data.cities ? data.cities.slice(0,4).join(', ') + '...' : '—' }
      ]);
    }

    function renderDiscord(data) {
      const created = new Date(Number(BigInt(data.id) >> 22n) + 1420070400000).toLocaleDateString('pt-BR');
      const avatar = data.avatar ? `https://cdn.discordapp.com/avatars/${data.id}/${data.avatar}.png?size=128` : null;

      buildGrid([
        { label: "Username", value: data.username || data.tag || '—' },
        { label: "Global Name", value: data.global_name || data.display_name || 'Não definido' },
        { label: "User ID", value: data.id },
        { label: "Conta Criada", value: created },
        { label: "Bot", value: data.bot ? "Sim" : "Não" },
        { label: "Avatar", value: avatar ? `<a href="${avatar}" target="_blank">Ver Avatar</a>` : 'Sem avatar' }
      ]);
    }

    function buildGrid(items) {
      infoGrid.innerHTML = '';
      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'info-item';
        div.innerHTML = `
          <div class="info-label">${item.label}</div>
          <div class="info-value">${item.value || '—'}</div>
        `;
        infoGrid.appendChild(div);
      });
    }

    function showError(msg) {
      errorBox.innerText = msg;
      errorBox.style.display = 'block';
    }
  </script>
</body>
</html>
