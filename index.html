<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Consulta Pro</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e40af);
      min-height: 100vh;
      color: #fff;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 900px;
      width: 100%;
      margin: 40px auto;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -1px;
    }

    .subtitle {
      opacity: 0.8;
      font-size: 1.1rem;
      margin-top: 8px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    }

    .search-area {
      display: flex;
      gap: 12px;
      margin-bottom: 10px;
    }

    .input-wrapper {
      flex: 1;
      position: relative;
    }

    input {
      width: 100%;
      padding: 16px 20px;
      border: 2px solid transparent;
      border-radius: 14px;
      font-size: 1.1rem;
      background: rgba(255, 255, 255, 0.95);
      color: #0f172a;
      transition: all 0.3s;
      outline: none;
    }

    input:focus {
      border-color: #fbbf24;
      background: #fff;
    }

    button {
      padding: 0 32px;
      background: #fbbf24;
      color: #0f172a;
      border: none;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    button:hover {
      background: #f59e0b;
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }

    .hint {
      font-size: 0.85rem;
      margin-top: 10px;
      opacity: 0.6;
      color: #fff;
    }

    .result {
      display: none;
      background: #ffffff;
      color: #1e2937;
      border-radius: 16px;
      padding: 25px;
      margin-top: 25px;
      animation: slideUp 0.4s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result.show {
      display: block;
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 15px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 15px;
    }

    .info-item {
      background: #f1f5f9;
      padding: 15px;
      border-radius: 12px;
      transition: background 0.2s;
      border-left: 4px solid #3b82f6;
    }

    .info-item:hover {
      background: #e2e8f0;
    }

    .info-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: 700;
      color: #64748b;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    .info-value {
      font-size: 1rem;
      font-weight: 600;
      color: #1e3a8a;
      word-break: break-all;
    }

    .loading {
      text-align: center;
      padding: 30px;
      display: none;
    }

    .spinner {
      width: 45px;
      height: 45px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid #fbbf24;
      border-radius: 50%;
      animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      margin: 0 auto 15px;
    }

    .error-msg {
      background: #fee2e2;
      color: #dc2626;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
      display: none;
      font-weight: 500;
      text-align: center;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    footer {
      margin-top: auto;
      padding: 20px;
      text-align: center;
      opacity: 0.6;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>⚡ Painel de Consulta Pro</h1>
      <p class="subtitle">CEP, CNPJ ou Telefone (DDD) em tempo real</p>
    </header>

    <div class="card">
      <div class="search-area">
        <div class="input-wrapper">
          <input type="text" id="inputDado" placeholder="Digite número, CEP ou CNPJ..." autocomplete="off">
        </div>
        <button id="btnConsultar">CONSULTAR</button>
      </div>
      <p class="hint">Ex: 11999998888 (Tel), 01001000 (CEP) ou 00000000000191 (CNPJ)</p>

      <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Acessando bancos de dados públicos...</p>
      </div>

      <div id="errorBox" class="error-msg"></div>

      <div id="resultado" class="result">
        <div class="result-header">
          <h2 id="tipoConsulta" style="color: #1e40af; font-size: 1.2rem;">Dados Encontrados</h2>
          <span id="timestamp" style="font-size: 0.8rem; color: #94a3b8;"></span>
        </div>
        <div class="info-grid" id="infoGrid"></div>
      </div>
    </div>
  </div>

  <footer>
    Utilizando BrasilAPI e ViaCEP • Fontes oficiais atualizadas
  </footer>

  <script>
    const btn = document.getElementById('btnConsultar');
    const inputField = document.getElementById('inputDado');
    const errorBox = document.getElementById('errorBox');
    const loading = document.getElementById('loading');
    const resultado = document.getElementById('resultado');
    const infoGrid = document.getElementById('infoGrid');

    btn.addEventListener('click', puxarDados);
    
    inputField.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') puxarDados();
    });

    async function puxarDados() {
      const valor = inputField.value.trim().replace(/\D/g, ''); 
      
      if (!valor) {
        showError('Por favor, insira um valor válido para consulta.');
        return;
      }

      errorBox.style.display = 'none';
      resultado.classList.remove('show');
      loading.style.display = 'block';
      infoGrid.innerHTML = '';

      try {
        let tipo = "";

        // Identificação por comprimento de caracteres numéricos
        if (valor.length === 8) {
          tipo = "Endereço (CEP)";
          const response = await fetch(`https://viacep.com.br/ws/${valor}/json/`);
          const dados = await response.json();
          if (dados.erro) throw new Error("CEP não encontrado.");
          renderCEP(dados);
        } 
        else if (valor.length === 10 || valor.length === 11) {
          tipo = "Localidade de Telefone (DDD)";
          const ddd = valor.substring(0, 2);
          const response = await fetch(`https://brasilapi.com.br/api/ddd/v1/${ddd}`);
          if (!response.ok) throw new Error("DDD inválido ou não encontrado.");
          const dados = await response.json();
          renderTelefone(dados, valor);
        }
        else if (valor.length === 14) {
          tipo = "Empresa (CNPJ)";
          const response = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${valor}`);
          if (!response.ok) throw new Error("CNPJ não cadastrado ou erro na base.");
          const dados = await response.json();
          renderCNPJ(dados);
        } 
        else {
          throw new Error("Formato inválido. Use 8 dígitos (CEP), 10/11 (Tel) ou 14 (CNPJ).");
        }

        document.getElementById('tipoConsulta').innerText = `✅ ${tipo}`;
        document.getElementById('timestamp').innerText = new Date().toLocaleTimeString();
        loading.style.display = 'none';
        resultado.classList.add('show');

      } catch (err) {
        loading.style.display = 'none';
        showError(err.message);
      }
    }

    function renderCEP(data) {
      const items = [
        { label: "Logradouro", value: data.logradouro },
        { label: "Bairro", value: data.bairro },
        { label: "Cidade", value: data.localidade },
        { label: "Estado", value: data.uf },
        { label: "DDD", value: data.ddd },
        { label: "IBGE", value: data.ibge }
      ];
      buildGrid(items);
    }

    function renderCNPJ(data) {
      const items = [
        { label: "Razão Social", value: data.razao_social },
        { label: "Nome Fantasia", value: data.nome_fantasia || "Não informado" },
        { label: "Situação", value: data.descricao_situacao_cadastral },
        { label: "Abertura", value: data.data_inicio_atividade },
        { label: "Cidade/UF", value: `${data.municipio} - ${data.uf}` },
        { label: "Capital Social", value: `R$ ${data.capital_social.toLocaleString('pt-BR')}` }
      ];
      buildGrid(items);
    }

    function renderTelefone(data, original) {
      const items = [
        { label: "Número Consultado", value: original },
        { label: "Estado", value: data.state },
        { label: "Tipo Identificado", value: original.length === 11 ? "Celular" : "Fixo" },
        { label: "Cidades na Região", value: data.cities.slice(0, 5).join(', ') + "..." }
      ];
      buildGrid(items);
    }

    function buildGrid(items) {
      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'info-item';
        div.innerHTML = `
          <div class="info-label">${item.label}</div>
          <div class="info-value">${item.value || 'Não informado'}</div>
        `;
        infoGrid.appendChild(div);
      });
    }

    function showError(msg) {
      errorBox.innerText = msg;
      errorBox.style.display = 'block';
    }
  </script>
</body>
</html>
