<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Consultas Brasil 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .result { white-space: pre-wrap; }
    .history-item { transition: all 0.2s; }
    .history-item:hover { background-color: #f8fafc; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="max-w-5xl mx-auto bg-white shadow-2xl rounded-3xl overflow-hidden mt-8">
    <!-- Header -->
    <div class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white p-8">
      <h1 class="text-3xl font-bold flex items-center gap-3">
        <i class="fas fa-search"></i> Painel de Consultas Brasil 2026
      </h1>
      <p class="mt-2 text-blue-100">CEP • CNPJ • CPF • Telefone</p>
    </div>

    <!-- Tabs -->
    <div class="flex border-b overflow-x-auto">
      <button onclick="switchTab(0)" class="tab-button flex-1 py-4 font-semibold text-lg border-b-4 border-blue-600 text-blue-600" data-tab="0">CEP</button>
      <button onclick="switchTab(1)" class="tab-button flex-1 py-4 font-semibold text-lg text-gray-600 hover:text-gray-800" data-tab="1">CNPJ</button>
      <button onclick="switchTab(2)" class="tab-button flex-1 py-4 font-semibold text-lg text-gray-600 hover:text-gray-800" data-tab="2">CPF</button>
      <button onclick="switchTab(3)" class="tab-button flex-1 py-4 font-semibold text-lg text-gray-600 hover:text-gray-800" data-tab="3">Telefone</button>
    </div>

    <div class="p-8">
      <!-- CEP -->
      <div id="tab-0" class="tab-content">
        <div class="flex gap-3">
          <input id="cepInput" type="text" maxlength="9" placeholder="00000-000" class="flex-1 border border-gray-300 rounded-2xl px-5 py-4 text-lg focus:outline-none focus:border-blue-500">
          <button onclick="consultarCEP()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 rounded-2xl font-semibold flex items-center gap-2">
            <i class="fas fa-search"></i> Consultar
          </button>
        </div>
        <div id="cepResult" class="result mt-6 bg-gray-50 p-6 rounded-2xl min-h-[140px]"></div>
      </div>

      <!-- CNPJ -->
      <div id="tab-1" class="tab-content hidden">
        <div class="flex gap-3">
          <input id="cnpjInput" type="text" maxlength="18" placeholder="00.000.000/0000-00" class="flex-1 border border-gray-300 rounded-2xl px-5 py-4 text-lg focus:outline-none focus:border-blue-500">
          <button onclick="consultarCNPJ()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 rounded-2xl font-semibold flex items-center gap-2">
            <i class="fas fa-search"></i> Consultar
          </button>
        </div>
        <div id="cnpjResult" class="result mt-6 bg-gray-50 p-6 rounded-2xl min-h-[140px]"></div>
      </div>

      <!-- CPF -->
      <div id="tab-2" class="tab-content hidden">
        <div class="flex gap-3">
          <input id="cpfInput" type="text" maxlength="14" placeholder="000.000.000-00" class="flex-1 border border-gray-300 rounded-2xl px-5 py-4 text-lg focus:outline-none focus:border-blue-500">
          <button onclick="consultarCPF()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 rounded-2xl font-semibold flex items-center gap-2">
            <i class="fas fa-search"></i> Consultar
          </button>
        </div>
        <div id="cpfResult" class="result mt-6 bg-gray-50 p-6 rounded-2xl min-h-[140px]"></div>
        <p class="text-xs text-gray-500 mt-3">* Gratuito: apenas validação + situação básica. Dados completos (nome, mãe, endereço) exigem API paga.</p>
      </div>

      <!-- Telefone -->
      <div id="tab-3" class="tab-content hidden">
        <div class="flex gap-3">
          <input id="telInput" type="text" maxlength="15" placeholder="(00) 00000-0000" class="flex-1 border border-gray-300 rounded-2xl px-5 py-4 text-lg focus:outline-none focus:border-blue-500">
          <button onclick="consultarTelefone()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 rounded-2xl font-semibold flex items-center gap-2">
            <i class="fas fa-search"></i> Consultar
          </button>
        </div>
        <div id="telResult" class="result mt-6 bg-amber-50 p-6 rounded-2xl min-h-[140px] text-amber-800"></div>
      </div>

      <!-- Histórico -->
      <div class="mt-12">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-xl font-semibold flex items-center gap-2"><i class="fas fa-history"></i> Histórico de Consultas</h2>
          <button onclick="limparHistorico()" class="text-red-600 hover:text-red-700 text-sm font-medium flex items-center gap-1">
            <i class="fas fa-trash"></i> Limpar tudo
          </button>
        </div>
        <div id="historico" class="space-y-3 max-h-96 overflow-y-auto pr-2"></div>
      </div>
    </div>
  </div>

  <script>
    let currentTab = 0;

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-content').forEach((el, i) => el.classList.toggle('hidden', i !== tab));
      document.querySelectorAll('.tab-button').forEach((btn, i) => {
        if (i === tab) btn.classList.add('border-b-4', 'border-blue-600', 'text-blue-600');
        else btn.classList.remove('border-b-4', 'border-blue-600', 'text-blue-600');
      });
    }

    // Máscaras automáticas
    function aplicarMascara(input, tipo) {
      input.addEventListener('input', () => {
        let v = input.value.replace(/\D/g, '');
        if (tipo === 'cep') v = v.slice(0,8).replace(/^(\d{5})(\d{3})$/, '$1-$2');
        else if (tipo === 'cnpj') v = v.slice(0,14).replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})$/, '$1.$2.$3/$4-$5');
        else if (tipo === 'cpf') v = v.slice(0,11).replace(/^(\d{3})(\d{3})(\d{3})(\d{2})$/, '$1.$2.$3-$4');
        else if (tipo === 'tel') {
          if (v.length <= 10) v = v.replace(/^(\d{2})(\d{4})(\d{4})$/, '($1) $2-$3');
          else v = v.replace(/^(\d{2})(\d{5})(\d{4})$/, '($1) $2-$3');
        }
        input.value = v;
      });
    }

    window.onload = () => {
      aplicarMascara(document.getElementById('cepInput'), 'cep');
      aplicarMascara(document.getElementById('cnpjInput'), 'cnpj');
      aplicarMascara(document.getElementById('cpfInput'), 'cpf');
      aplicarMascara(document.getElementById('telInput'), 'tel');
      carregarHistorico();
    };

    // Validação de CPF (algoritmo oficial)
    function validarCPF(cpf) {
      cpf = cpf.replace(/\D/g, '');
      if (cpf.length !== 11 || /^(\d)\1{10}$/.test(cpf)) return false;
      let soma = 0, resto;
      for (let i = 1; i <= 9; i++) soma += parseInt(cpf[i-1]) * (11 - i);
      resto = (soma * 10) % 11;
      if (resto === 10 || resto === 11) resto = 0;
      if (resto !== parseInt(cpf[9])) return false;
      soma = 0;
      for (let i = 1; i <= 10; i++) soma += parseInt(cpf[i-1]) * (12 - i);
      resto = (soma * 10) % 11;
      if (resto === 10 || resto === 11) resto = 0;
      return resto === parseInt(cpf[10]);
    }

    // Consulta CPF (validação + tentativa básica)
    async function consultarCPF() {
      let cpf = document.getElementById('cpfInput').value.replace(/\D/g, '');
      const resultDiv = document.getElementById('cpfResult');

      if (cpf.length !== 11 || !validarCPF(cpf)) {
        resultDiv.innerHTML = `<p class="text-red-600 font-medium">CPF inválido ou dígito verificador incorreto.</p>`;
        return;
      }

      resultDiv.innerHTML = `<p class="text-blue-600">Validando CPF...</p>`;

      // Validação básica + aviso claro
      resultDiv.innerHTML = `
        <p class="font-semibold text-green-600">✅ CPF válido</p>
        <p><strong>CPF:</strong> ${document.getElementById('cpfInput').value}</p>
        <p class="mt-4 text-amber-700">
          <strong>Observação:</strong> Não é possível obter nome completo, nome da mãe/pai ou endereço de forma gratuita via API pública (LGPD).<br>
          Para dados completos, utilize serviços pagos (CPFCNPJ, APIBrasil, etc.).
        </p>
      `;

      adicionarAoHistorico('CPF', document.getElementById('cpfInput').value, resultDiv.innerHTML);
    }

    // (Mantive as funções anteriores de CEP, CNPJ e Telefone – só adicionei o CPF)
    // ... (cole aqui as funções consultarCEP, consultarCNPJ, consultarTelefone, adicionarAoHistorico, carregarHistorico e limparHistorico da versão anterior)

    async function consultarCEP() { /* mesma função da versão anterior */ }
    async function consultarCNPJ() { /* mesma função da versão anterior */ }
    function consultarTelefone() { /* mesma função da versão anterior */ }

    function adicionarAoHistorico(tipo, valor, resultadoHTML) {
      let historico = JSON.parse(localStorage.getItem('consultaHistorico') || '[]');
      historico.unshift({ tipo, valor, data: new Date().toLocaleString('pt-BR'), resultado: resultadoHTML });
      if (historico.length > 25) historico.pop();
      localStorage.setItem('consultaHistorico', JSON.stringify(historico));
      carregarHistorico();
    }

    function carregarHistorico() {
      const div = document.getElementById('historico');
      let historico = JSON.parse(localStorage.getItem('consultaHistorico') || '[]');
      if (historico.length === 0) {
        div.innerHTML = `<p class="text-gray-400 text-center py-8">Nenhuma consulta ainda.</p>`;
        return;
      }
      div.innerHTML = historico.map(item => `
        <div class="history-item bg-white border border-gray-200 rounded-2xl p-5 text-sm">
          <div class="flex justify-between text-xs text-gray-500 mb-2">
            <span class="font-semibold">${item.tipo}</span>
            <span>${item.data}</span>
          </div>
          <div class="font-mono text-blue-700">${item.valor}</div>
          <div class="mt-3 text-gray-700 text-xs">${item.resultado}</div>
        </div>
      `).join('');
    }

    function limparHistorico() {
      if (confirm('Limpar todo o histórico?')) {
        localStorage.removeItem('consultaHistorico');
        carregarHistorico();
      }
    }

    // Enter key
    document.addEventListener('keypress', e => {
      if (e.key === 'Enter') {
        if (currentTab === 0) consultarCEP();
        if (currentTab === 1) consultarCNPJ();
        if (currentTab === 2) consultarCPF();
        if (currentTab === 3) consultarTelefone();
      }
    });
  </script>
</body>
</html>
