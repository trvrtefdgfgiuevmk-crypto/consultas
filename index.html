<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Consulta Pro</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e40af);
      min-height: 100vh;
      color: #fff;
      display: flex;
      flex-direction: column;
    }
    .container { max-width: 920px; width: 100%; margin: 40px auto; padding: 20px; }
    header { text-align: center; margin-bottom: 40px; }
    h1 { font-size: 2.6rem; font-weight: 600; letter-spacing: -1px; }
    .subtitle { opacity: 0.85; font-size: 1.15rem; margin-top: 8px; }

    .card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.45);
    }

    .search-area { display: flex; gap: 12px; margin-bottom: 12px; }
    input {
      flex: 1;
      padding: 17px 20px;
      border: 2px solid transparent;
      border-radius: 14px;
      font-size: 1.12rem;
      background: rgba(255,255,255,0.95);
      color: #0f172a;
      outline: none;
    }
    input:focus { border-color: #fbbf24; background: #fff; }

    button {
      padding: 0 36px;
      background: #fbbf24;
      color: #0f172a;
      border: none;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
      font-size: 1.05rem;
    }
    button:hover { background: #f59e0b; transform: translateY(-2px); }

    .hint { font-size: 0.88rem; margin-top: 10px; opacity: 0.8; text-align: center; }

    .result {
      display: none;
      background: #ffffff;
      color: #1e2937;
      border-radius: 16px;
      padding: 28px;
      margin-top: 25px;
      box-shadow: 0 10px 35px rgba(0,0,0,0.1);
    }
    .result.show { display: block; }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
      padding-bottom: 16px;
      border-bottom: 1px solid #e2e8f0;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 16px;
    }
    .info-item {
      background: #f8fafc;
      padding: 17px;
      border-radius: 12px;
      border-left: 5px solid #3b82f6;
    }
    .info-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      font-weight: 700;
      color: #64748b;
      margin-bottom: 7px;
    }
    .info-value {
      font-size: 1.05rem;
      font-weight: 600;
      color: #1e40af;
      line-height: 1.4;
    }

    .loading { text-align: center; padding: 50px 20px; display: none; }
    .spinner {
      width: 52px; height: 52px;
      border: 5px solid rgba(251,191,36,0.2);
      border-top: 5px solid #fbbf24;
      border-radius: 50%;
      animation: spin 0.95s linear infinite;
      margin: 0 auto 18px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: #fee2e2;
      color: #dc2626;
      padding: 16px;
      border-radius: 12px;
      margin-top: 20px;
      display: none;
      font-weight: 500;
      text-align: center;
    }

    footer { margin-top: auto; padding: 30px; text-align: center; opacity: 0.7; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>⚡ Painel de Consulta Pro</h1>
      <p class="subtitle">CEP • Telefone • CNPJ</p>
    </header>

    <div class="card">
      <div class="search-area">
        <input type="text" id="inputDado" placeholder="Digite CEP, Telefone ou CNPJ..." autocomplete="off">
        <button id="btnConsultar">CONSULTAR</button>
      </div>
      <p class="hint">
        Ex: 01001000 (CEP) | 21978310475 (Telefone) | 00000000000191 (CNPJ)
      </p>

      <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Buscando informações...</p>
      </div>

      <div id="errorBox" class="error-msg"></div>

      <div id="resultado" class="result">
        <div class="result-header">
          <h2 id="tipoConsulta" style="color: #1e40af; font-size: 1.3rem;">Dados Encontrados</h2>
          <span id="timestamp" style="font-size: 0.87rem; color: #64748b;"></span>
        </div>
        <div class="info-grid" id="infoGrid"></div>
      </div>
    </div>
  </div>

  <footer>
    ViaCEP • BrasilAPI • Bairro disponível apenas na consulta por CEP
  </footer>

  <script>
    const btn = document.getElementById('btnConsultar');
    const inputField = document.getElementById('inputDado');
    const errorBox = document.getElementById('errorBox');
    const loading = document.getElementById('loading');
    const resultado = document.getElementById('resultado');
    const infoGrid = document.getElementById('infoGrid');

    btn.addEventListener('click', puxarDados);
    inputField.addEventListener('keypress', (e) => { if (e.key === 'Enter') puxarDados(); });

    async function puxarDados() {
      let valor = inputField.value.trim().replace(/\D/g, '');
      if (!valor) return showError('Digite algo para consultar.');

      errorBox.style.display = 'none';
      resultado.classList.remove('show');
      loading.style.display = 'block';
      infoGrid.innerHTML = '';

      try {
        let tipo = "";

        if (valor.length === 8) {
          tipo = "Endereço (CEP)";
          const res = await fetch(`https://viacep.com.br/ws/${valor}/json/`);
          const data = await res.json();
          if (data.erro) throw new Error("CEP não encontrado.");
          renderCEP(data);

        } else if (valor.length === 10 || valor.length === 11) {
          tipo = "Telefone";
          const ddd = valor.substring(0, 2);
          const res = await fetch(`https://brasilapi.com.br/api/ddd/v1/${ddd}`);
          if (!res.ok) throw new Error("DDD inválido ou não encontrado.");
          const data = await res.json();
          renderTelefone(data, valor);

        } else if (valor.length === 14) {
          tipo = "Empresa (CNPJ)";
          const res = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${valor}`);
          if (!res.ok) throw new Error("CNPJ não encontrado.");
          const data = await res.json();
          renderCNPJ(data);

        } else {
          throw new Error("Formato inválido. Use CEP (8 dígitos), Telefone (10 ou 11) ou CNPJ (14 dígitos).");
        }

        document.getElementById('tipoConsulta').innerText = `✅ ${tipo}`;
        document.getElementById('timestamp').innerText = new Date().toLocaleTimeString('pt-BR');
        loading.style.display = 'none';
        resultado.classList.add('show');

      } catch (err) {
        loading.style.display = 'none';
        showError(err.message);
      }
    }

    function renderCEP(data) {
      buildGrid([
        { label: "Logradouro", value: data.logradouro || '—' },
        { label: "Bairro", value: `<strong>${data.bairro || 'Não informado'}</strong>` },
        { label: "Cidade", value: data.localidade },
        { label: "Estado", value: data.uf },
        { label: "DDD", value: data.ddd || '—' },
        { label: "IBGE", value: data.ibge || '—' }
      ]);
    }

    function renderTelefone(data, numeroCompleto) {
      buildGrid([
        { label: "Número Completo", value: numeroCompleto },
        { label: "DDD", value: `${data.state} (${data.state})` },
        { label: "Estado", value: data.state },
        { label: "Tipo", value: numeroCompleto.length === 11 ? "Celular" : "Fixo" },
        { label: "Cidades na Região", value: data.cities ? data.cities.slice(0, 7).join(', ') + (data.cities.length > 7 ? '...' : '') : '—' },
        { label: "Bairro", value: "Não disponível apenas com o número de telefone" }
      ]);
    }

    function renderCNPJ(data) {
      buildGrid([
        { label: "Razão Social", value: data.razao_social },
        { label: "Nome Fantasia", value: data.nome_fantasia || 'Não informado' },
        { label: "Situação", value: data.descricao_situacao_cadastral },
        { label: "Abertura", value: data.data_inicio_atividade },
        { label: "Cidade/UF", value: `${data.municipio} - ${data.uf}` },
        { label: "Capital Social", value: `R$ ${Number(data.capital_social || 0).toLocaleString('pt-BR')}` }
      ]);
    }

    function buildGrid(items) {
      infoGrid.innerHTML = '';
      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'info-item';
        div.innerHTML = `
          <div class="info-label">${item.label}</div>
          <div class="info-value">${item.value}</div>
        `;
        infoGrid.appendChild(div);
      });
    }

    function showError(msg) {
      errorBox.innerHTML = msg;
      errorBox.style.display = 'block';
    }
  </script>
</body>
</html>
